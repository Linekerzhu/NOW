version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      - NOW_DB_PATH=/data/now.db
      - NOW_API_TOKEN=now-dev-token
    volumes:
      - db-data:/data

  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  db-data:
